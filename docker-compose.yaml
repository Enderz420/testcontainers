services:
  database:
    container_name: "database"
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "14330:1433"
    environment:
      SA_PASSWORD: "oPax9HFmjU4AVAqXEeA"
      ACCEPT_EULA: "Y"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'oPax9HFmjU4AVAqXEeA' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    command: >
      /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 15 && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'oPax9HFmjU4AVAqXEeA' -C -Q 'CREATE DATABASE test' && wait"
