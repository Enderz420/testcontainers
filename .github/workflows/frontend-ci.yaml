name: Frontend CI Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

jobs:
  unit-test-frontend:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webpage
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: webpage/package-lock.json
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test
